name: Standalone-Binaries bauen und veroeffentlichen

# Baut das Doppelklick-Binary auf nativen Runnern (macOS + Windows) und haengt
# es an ein GitHub-Release. Ausgeloest durch einen Versions-Tag (z. B. v5.2.0)
# oder manuell.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artefakt: wallee-query-builder-macos
            datei: dist/wallee-query-builder
          - os: windows-latest
            artefakt: wallee-query-builder-windows.exe
            datei: dist/wallee-query-builder.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Tests
        run: node --test "test/*.test.js"

      - name: Binary bauen
        run: node build/build.mjs

      - name: Artefakt benennen
        shell: bash
        run: cp "${{ matrix.datei }}" "${{ matrix.artefakt }}"

      - name: Als Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artefakt }}
          path: ${{ matrix.artefakt }}

      - name: An das Release haengen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artefakt }}
